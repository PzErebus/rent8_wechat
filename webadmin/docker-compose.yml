version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: rent8_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Rent8@Root2024!
      MYSQL_DATABASE: rent8_admin
      MYSQL_USER: rent8_user
      MYSQL_PASSWORD: Rent8@User2024!
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - rent8_network
    command: --default-authentication-plugin=mysql_native_password

  # PHP应用
  php:
    image: php:8.0-fpm
    container_name: rent8_php
    restart: always
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    networks:
      - rent8_network
    depends_on:
      - mysql

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: rent8_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - rent8_network
    depends_on:
      - php

volumes:
  mysql_data:

networks:
  rent8_network:
    driver: bridge
